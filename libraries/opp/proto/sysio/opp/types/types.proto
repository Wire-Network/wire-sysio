syntax = "proto3";

package sysio.opp.types;

option cc_enable_arenas = true;

// ---------------------------------------------------------------------------
//  Chain identifier
// ---------------------------------------------------------------------------

enum ChainKind  {
  CHAIN_KIND_UNKNOWN = 0;
  CHAIN_KIND_WIRE = 1;
  CHAIN_KIND_ETHEREUM = 2;
  CHAIN_KIND_SOLANA = 3;
  CHAIN_KIND_SUI = 4;
}

message ChainId {
  ChainKind kind = 1;
  uint32    id = 2;
}

enum ChainKeyType {
  CHAIN_KEY_TYPE_UNKNOWN = 0;
  CHAIN_KEY_TYPE_WIRE = 1;
  CHAIN_KEY_TYPE_WIRE_BLS = 2;
  CHAIN_KEY_TYPE_ETHEREUM = 3;
  CHAIN_KEY_TYPE_SOLANA = 4;
  CHAIN_KEY_TYPE_SUI = 5;
}

// Address on a specific chain.
message ChainAddress {
  ChainKind kind = 1;
  bytes     address = 2;
}

message ChainSignature {
  ChainAddress actor = 1;
  ChainKeyType key_type = 2;
  bytes        signature = 3;
}

message WireAccount {
  string name = 1;
}

message WirePermission {
  WireAccount account = 1;
  string permission = 2; // e.g. "active", "owner"
}

enum UnderwriteRequestStatus {
  UNDERWRITE_REQUEST_STATUS_PENDING = 0;
  UNDERWRITE_REQUEST_STATUS_CONFIRMED = 1;
  UNDERWRITE_REQUEST_STATUS_REJECTED = 2;
  UNDERWRITE_REQUEST_STATUS_COMPLETED = 3;
  UNDERWRITE_REQUEST_STATUS_EXPIRED = 4;
}

// ---------------------------------------------------------------------------
//  Token types
// ---------------------------------------------------------------------------

// Token identifier (upper byte encodes chain family).
enum TokenKind {
  TOKEN_KIND_WIRE = 0; // 0x0000
  TOKEN_KIND_ETH = 256; // 0x0100
  TOKEN_KIND_ERC20 = 257; // 0x0101
  TOKEN_KIND_ERC721 = 258; // 0x0102
  TOKEN_KIND_ERC1155 = 259; // 0x0103
  TOKEN_KIND_LIQETH = 496; // 0x01F0
  TOKEN_KIND_SOL = 512; // 0x0200
  TOKEN_KIND_LIQSOL = 752; // 0x02F0
}

// Token type and signed amount.
message TokenAmount {
  TokenKind kind = 1;
  int64     amount = 2;
}

// ---------------------------------------------------------------------------
//  Encoding flags  (originally a single uint8 bitfield)
//
//  Decomposed into discrete fields for protobuf compatibility.
//  Wire-format packing: endianness | (hash_algorithm << 1)
//                       | (length_encoding << 3) | reserved
// ---------------------------------------------------------------------------

enum Endianness {
  ENDIANNESS_BIG = 0; // 0x00
  ENDIANNESS_LITTLE = 1; // 0x01
}

enum HashAlgorithm {
  HASH_ALGORITHM_KECCAK256 = 0; // bits[2:1] = 00
  HASH_ALGORITHM_SHA256 = 1; // bits[2:1] = 01
  HASH_ALGORITHM_RESERVED_1 = 2; // bits[2:1] = 10
  HASH_ALGORITHM_RESERVED_2 = 3; // bits[2:1] = 11
}

enum LengthEncoding {
  LENGTH_ENCODING_VARUINT = 0; // bit[3] = 0
  LENGTH_ENCODING_UINT32 = 1; // bit[3] = 1
}

// Structured representation of encoding_flags_t.
message EncodingFlags {
  Endianness     endianness = 1;
  HashAlgorithm  hash_algorithm = 2;
  LengthEncoding length_encoding = 3;
}

// ---------------------------------------------------------------------------
//  Attestation discriminant
// ---------------------------------------------------------------------------

enum AttestationType {
  ATTESTATION_TYPE_UNSPECIFIED = 0;
  ATTESTATION_TYPE_OPERATOR_ACTION = 2001; // 0x0BB9
  ATTESTATION_TYPE_STAKE = 3001; // 0x0BB9
  ATTESTATION_TYPE_UNSTAKE = 3002; // 0x0BBA
  // DEPRECATED — pre-launch only, do not use in new code.
  ATTESTATION_TYPE_PRETOKEN_PURCHASE = 3004; // 0x0BBB
  // DEPRECATED — pre-launch only, do not use in new code.
  ATTESTATION_TYPE_PRETOKEN_YIELD = 3006; // 0x0BBE
  ATTESTATION_TYPE_RESERVE_BALANCE_SHEET = 43520; // 0xAA00
  ATTESTATION_TYPE_STAKE_UPDATE = 60928; // 0xEE00
  // 60929 (0xEE01) was ATTESTATION_TYPE_NATIVE_YIELD_REWARD — removed; STAKING_REWARD
  // is the single staker-reward feedback path. Slot left free; do not reuse.
  // DEPRECATED — pre-launch only, do not use in new code.
  ATTESTATION_TYPE_WIRE_TOKEN_PURCHASE = 60930; // 0xEE02
  ATTESTATION_TYPE_CHALLENGE_RESPONSE = 60932; // 0xEE04
  // SLASH is now an OperatorAction sub-type (action_type=ACTION_TYPE_SLASH)
  // carried inside an OPERATOR_ACTION attestation; the standalone
  // SLASH_OPERATOR attestation type has been removed. Slot 60933 left free.
  // Source-outpost-emitted swap intent. Renamed from ATTESTATION_TYPE_SWAP for
  // clarity; the lifecycle is SWAP_REQUEST -> (variance OK) -> UWREQ ->
  // (underwriter race + REMIT/SWAP_REMIT) OR (variance bad) -> SWAP_REVERT.
  ATTESTATION_TYPE_SWAP_REQUEST = 60934; // 0xEE06
  // 60935 (0xEE07) was ATTESTATION_TYPE_UNDERWRITE_INTENT — removed; the race
  // resolver uses ATTESTATION_TYPE_UNDERWRITE_INTENT_COMMIT (60953) only.
  // Slot left free; do not reuse.
  // 60936 (0xEE08) was ATTESTATION_TYPE_UNDERWRITE_CONFIRM — removed; the
  // depot resolves the race internally with no on-wire confirm. Slot left
  // free; do not reuse.
  // 60937 (0xEE09) was ATTESTATION_TYPE_UNDERWRITE_REJECT — removed; depot
  // rejection of bad commits is handled internally (log + skip on signature
  // verification failure; pre-launch slashing decision pending). Slot left
  // free; do not reuse.
  // 60938 (0xEE0A) was ATTESTATION_TYPE_UNDERWRITE_UNLOCK — removed; the
  // release lifecycle is fully covered by SWAP_REMIT / SWAP_REVERT. Slot
  // left free; do not reuse.
  // Depot -> destination outpost. Pay the swap recipient out of the destination
  // outpost's reserve. Renamed from ATTESTATION_TYPE_REMIT; the depot is the
  // ground truth — every SWAP_REMIT is depot-authorized. If the destination
  // outpost cannot remit (insufficient reserve, recipient revert, etc.) it
  // emits ATTESTATION_TYPE_SWAP_REJECTED back to the depot and the token stays
  // in its reserve.
  ATTESTATION_TYPE_SWAP_REMIT = 60944; // 0xEE10
  ATTESTATION_TYPE_CHALLENGE_REQUEST = 60945; // 0xEE11
  // 60946 (0xEE12) was ATTESTATION_TYPE_EPOCH_SYNC — removed; the depot's
  // `sysio.epoch::advance` flow is now the sole driver of epoch progression and
  // `epoch_duration_sec` rides every `BatchOperatorGroups` attestation. Slot
  // left free; do not reuse.
  ATTESTATION_TYPE_OPERATORS = 60947; // 0xEE13
  // 60948 (0xEE14) was ATTESTATION_TYPE_REMIT_CONFIRM — removed; the depot is
  // the ground truth, every SWAP_REMIT is depot-authorized so success-by-default
  // applies. Failures are signalled by ATTESTATION_TYPE_SWAP_REJECTED. Slot
  // left free; do not reuse.
  ATTESTATION_TYPE_BATCH_OPERATOR_GROUPS = 60943; // 0xEE0F
  ATTESTATION_TYPE_NODE_OWNER_REG = 60949; // 0xEE15
  ATTESTATION_TYPE_STAKING_REWARD = 60950; // 0xEE16
  ATTESTATION_TYPE_STAKE_RESULT = 60951; // 0xEE17
  ATTESTATION_TYPE_ATTESTATION_PROCESSING_ERROR = 60952; // 0xEE18

  // ---------------------------------------------------------------------------
  //  New collateral / underwriter / variance-revert lifecycle (post-rebase).
  //  See CLAUDE-WIRE-OPERATOR-COLLATERAL-IMPL-PLAN.md §6 for the full contracts.
  // ---------------------------------------------------------------------------
  // Underwriter -> outpost (JSON-RPC) -> depot. Single attestation per (underwriter, outpost) leg;
  // the depot resolves the race when both legs land for the same underwriter.
  // The underwriter constructs the UnderwriteIntentCommit off-chain, signs the
  // digest of its serialized-with-empty-signature form, places the signature
  // back into the same struct, re-serializes, and submits those bytes to each
  // outpost's commit endpoint. Outposts auth-check the caller as a registered
  // active underwriter and relay the bytes verbatim; the depot verifies the
  // signature against the underwriter's account permissions.
  ATTESTATION_TYPE_UNDERWRITE_INTENT_COMMIT = 60953; // 0xEE19
  // 60954 (0xEE1A) was ATTESTATION_TYPE_UNDERWRITE_INTENT_REJECT — removed;
  // there is no underwriter "voluntary decline" path, and depot-side rejection
  // of bad commits is handled internally (log + skip; pre-launch slashing
  // decision pending). Slot left free; do not reuse.
  // Depot -> source outpost. Variance check failed; refund the user's deposit.
  ATTESTATION_TYPE_SWAP_REVERT = 60955;              // 0xEE1B
  // Depot -> source outpost. Identity / link-table validation failed at the
  // opreg layer (unknown originating account, missing authex link for this
  // chain, operator in non-deposit-eligible state). Outpost matches the
  // referenced original_message_id and refunds the depositor.
  ATTESTATION_TYPE_DEPOSIT_REVERT = 60956;            // 0xEE1C
  // Destination outpost -> depot. The outpost could not pay the SWAP_REMIT
  // (insufficient reserve, recipient revert, paused contract, etc.) and the
  // token remains in its reserve. Depot calls sysio.reserv::onreject which
  // adds `unremitted_amount.amount` back to `reserve_outpost_amount` so the
  // depot's view of the reserve reconciles with the outpost's actual balance.
  ATTESTATION_TYPE_SWAP_REJECTED = 60957;             // 0xEE1D
  // Depot -> outpost. The emissions readiness gate in sysio.epoch::advance
  // could not pay the next epoch (config missing, treasury exhausted, or
  // sysio account balance insufficient). The chain stays at the prior epoch
  // index until conditions allow a successful gate pass.
  ATTESTATION_TYPE_EMISSIONS_BLOCKED = 60958;         // 0xEE1E
}

// Reason codes for ATTESTATION_TYPE_EMISSIONS_BLOCKED. Emitted by
// sysio.epoch::advance when its emissions readiness gate cannot pay
// the next epoch.
enum EmissionsBlockReason {
  EMISSIONS_BLOCK_REASON_UNSPECIFIED          = 0;
  EMISSIONS_BLOCK_REASON_CONFIG_MISSING       = 1; // sysio.system::setemitcfg not called
  EMISSIONS_BLOCK_REASON_STATE_UNINITIALIZED  = 2; // sysio.system::initt5 not called
  EMISSIONS_BLOCK_REASON_TREASURY_EXHAUSTED   = 3; // t5_distributable - t5_floor - total_distributed <= 0
  EMISSIONS_BLOCK_REASON_BALANCE_INSUFFICIENT = 4; // sysio's WIRE balance < computed emission
}

// ---------------------------------------------------------------------------
//  Staker / Operator lifecycle
// ---------------------------------------------------------------------------

enum StakeStatus {
  STAKE_STATUS_UNKNOWN = 0;
  STAKE_STATUS_WARMUP = 1; // 0x01
  STAKE_STATUS_COOLDOWN = 2; // 0x02
  STAKE_STATUS_ACTIVE = 3; // 0x03
  STAKE_STATUS_TERMINATED = 240; // 0xF0
  STAKE_STATUS_SLASHED = 241; // 0xF1
}

enum OperatorType {
  OPERATOR_TYPE_UNKNOWN = 0;
  OPERATOR_TYPE_PRODUCER = 1; // 0x01
  OPERATOR_TYPE_BATCH = 2; // 0x02
  OPERATOR_TYPE_UNDERWRITER = 3; // 0x03
  OPERATOR_TYPE_CHALLENGER = 4; // 0x04
}

enum OperatorStatus {
  OPERATOR_STATUS_UNKNOWN = 0;
  OPERATOR_STATUS_WARMUP = 1; // 0x01
  OPERATOR_STATUS_COOLDOWN = 2; // 0x02
  OPERATOR_STATUS_ACTIVE = 3; // 0x03
  OPERATOR_STATUS_TERMINATED = 240; // 0xF0
  OPERATOR_STATUS_SLASHED = 241; // 0xF1
}

// ---------------------------------------------------------------------------
//  Depot contract state enums
// ---------------------------------------------------------------------------

enum ChainRequestStatus {
  CHAIN_REQUEST_STATUS_PENDING = 0;
  CHAIN_REQUEST_STATUS_COLLECTING = 1;
  CHAIN_REQUEST_STATUS_CONSENSUS_OK = 2;
  CHAIN_REQUEST_STATUS_CONSENSUS_FAIL = 3;
  CHAIN_REQUEST_STATUS_CHALLENGED = 4;
}

enum MessageDirection {
  MESSAGE_DIRECTION_INBOUND = 0;
  MESSAGE_DIRECTION_OUTBOUND = 1;
}

enum MessageStatus {
  MESSAGE_STATUS_PENDING = 0;
  MESSAGE_STATUS_READY = 1;
  MESSAGE_STATUS_PROCESSED = 2;
  MESSAGE_STATUS_CANCELLED = 3;
}

enum EnvelopeStatus {
  ENVELOPE_STATUS_PENDING_DELIVERY = 0;
  ENVELOPE_STATUS_DELIVERED = 1;
  ENVELOPE_STATUS_CONFIRMED = 2;
}

enum AttestationStatus {
  ATTESTATION_STATUS_PENDING   = 0; // Requires further processing before being applied
  ATTESTATION_STATUS_READY     = 1; // Ready to process or send outbound
  ATTESTATION_STATUS_PROCESSED = 2; // Fully processed
}

enum UnderwriteStatus {
  UNDERWRITE_STATUS_INTENT_CREATED = 0;
  UNDERWRITE_STATUS_INTENT_SUBMITTED = 1;
  UNDERWRITE_STATUS_INTENT_CONFIRMED = 2;
  UNDERWRITE_STATUS_READY = 3;
  UNDERWRITE_STATUS_RELEASED = 5;
  UNDERWRITE_STATUS_SLASHED = 10;
}

enum ChallengeStatus {
  CHALLENGE_STATUS_CHALLENGE_SENT = 0;
  CHALLENGE_STATUS_RESPONSE_RECEIVED = 1;
  CHALLENGE_STATUS_RESOLVED = 2;
  CHALLENGE_STATUS_ESCALATED = 3;
}

syntax = "proto3";

package sysio.opp.attestations;

import "sysio/opp/types/types.proto";
import "sysio/opp/opp.proto";

option cc_enable_arenas = true;

// ---------------------------------------------------------------------------
//  Common (Pre & Post Launch) Attestations
// ---------------------------------------------------------------------------

// Reserve balance snapshot for a given chain.
message ChainReserveBalanceSheet {
  sysio.opp.types.ChainKind               kind = 1;
  repeated sysio.opp.types.TokenAmount amounts = 2;
}

// ---------------------------------------------------------------------------
//  Pre-launch specific attestations
// ---------------------------------------------------------------------------

// Pre-token stake attestation.
message PretokenStakeChange {
  sysio.opp.types.ChainAddress actor = 1;
  sysio.opp.types.TokenAmount amount = 2;
  int64                index_at_mint = 10; // -1 == unstake action
  int64                index_at_burn = 11; // -1 == stake action
}

// Pre-token purchase attestation.
message PretokenPurchase {
  sysio.opp.types.ChainAddress actor = 1;
  sysio.opp.types.TokenAmount  amount = 2;
  int64                        pretoken_count = 3;
  int64                        index_at_mint = 10;
}

// Pre-token yield distribution.
message PretokenYield {
  sysio.opp.types.ChainAddress actor = 1;
  sysio.opp.types.TokenAmount  amount = 2;
  int64                        index_at_mint = 3;
}

// ---------------------------------------------------------------------------
//  Post-launch attestations
// ---------------------------------------------------------------------------

// Stake status update.
message StakeUpdate {
  sysio.opp.types.ChainAddress actor = 1;
  sysio.opp.types.StakeStatus  status = 2;
  sysio.opp.types.TokenAmount  amount = 3;
}

// Wire token purchase.
message WireTokenPurchase {
  sysio.opp.types.ChainAddress actor = 1;
  repeated sysio.opp.types.TokenAmount amounts = 2;
}

// Single envelope for every operator-affecting action across the deposit /
// withdraw / slash lifecycle.
//
// Sub-types (carried in `action_type`):
//   DEPOSIT          outpost -> depot   "operator deposited X tokens; record the bond"
//   WITHDRAW_REQUEST outpost -> depot   "operator wants to withdraw X tokens; queue the 2-epoch wait"
//   WITHDRAW_REMIT   depot   -> outpost "approved; transfer X tokens to the authex-resolved destination"
//                                       success-path terminator — the depot's irreversible drain of
//                                       `sysio.opreg::wtdwqueue` in `flushwtdw` is the authoritative
//                                       audit trail; no roundtrip ack required.
//   SLASH            depot   -> outpost "seize X tokens of `token_kind` from the operator's escrow on
//                                       `chain` and route to `lp_target`". Depot-internal — emitted by
//                                       `sysio.opreg::slash` (and uwrit deferred-slash on lock release);
//                                       NEVER accepted inbound at the depot.
//
// `actor` semantics by sub-type:
//   DEPOSIT / WITHDRAW_REQUEST — the operator's address on the source chain.
//   WITHDRAW_REMIT             — the destination address resolved via sysio.authex on the depot side;
//                                may differ from the operator's canonical chain address if they
//                                registered an alternate withdrawal recipient.
//   SLASH                      — the operator's WIRE account name encoded as bytes with kind=CHAIN_KIND_WIRE.
//
// SLASH-only fields (`chain` / `reason`) are zero / empty for every other
// action type and are ignored by their handlers. (`lp_target` and
// `slashed_at_epoch` were removed in the operator-collateral refactor —
// slash routing now derives the reserve target from the chain+token of
// the seized amount, and the depot's `operator_entry.updated_at` carries
// the timestamp.)
message OperatorAction {
  enum ActionType {
    ACTION_TYPE_UNKNOWN          = 0;
    ACTION_TYPE_DEPOSIT_REQUEST  = 1;
    ACTION_TYPE_WITHDRAW_REQUEST = 2;
    ACTION_TYPE_WITHDRAW_REMIT   = 3;
    ACTION_TYPE_SLASH            = 4;
  };
  ActionType                       action_type = 1;
  // Operator's outpost-chain identity, carried as the FULL chain public key
  // (not the derived address) so the depot can resolve it through
  // sysio.authex::links's `bypubkey` index (existing — no new index needed).
  // For Ethereum / WIRE (secp256k1) this is the 33-byte compressed pub key;
  // for Solana (Ed25519) it is the 32-byte pubkey, which is also the
  // address. The depot looks up the WIRE account from the linked pubkey;
  // outposts in turn derive the local chain address from the same pubkey.
  sysio.opp.types.ChainAddress     op_address  = 2;
  sysio.opp.types.OperatorType     type        = 3;
  sysio.opp.types.OperatorStatus   status      = 4;
  sysio.opp.types.TokenAmount      amount      = 5;
  // Links a WITHDRAW_REMIT back to its originating WITHDRAW_REQUEST. Zero / unset
  // for DEPOSIT_REQUEST and SLASH.
  uint64                           request_id  = 6;
  // Which outpost chain holds the escrow this action concerns. For DEPOSIT_REQUEST
  // and WITHDRAW_REQUEST, identifies the holding outpost; for SLASH, identifies
  // the outpost expected to seize its share (outposts on other chains drop the
  // SLASH); for WITHDRAW_REMIT, identifies the outpost that must release.
  sysio.opp.types.ChainKind        chain       = 7;
  // Human-readable reason recorded by the depot. Populated on SLASH (slash
  // motivation) and on log-only failure paths; empty otherwise.
  string                           reason      = 8;
}

// Per-operator audit log entry stored in `sysio.opreg::operators[].recent_actions`.
// Captures every OperatorAction the depot has applied (or rejected) for an
// operator, with its outcome. The log is a 5-deep ring buffer: oldest entry
// drops when a sixth is appended.
message OperatorActionLog {
  OperatorAction action        = 1;
  // True when the action mutated state as intended; false when validation
  // rejected it (e.g., insufficient available balance, slashed operator,
  // unknown account). The action is still recorded so operators can see
  // why their request was dropped.
  bool           success       = 2;
  // sysio.current_time_point().sec_since_epoch() at which the action was
  // applied / rejected.
  int64          timestamp     = 3;
  // Reason the action failed, when `success == false`. Empty on success.
  // Contract layer caps at 2048 bytes on append.
  string         error_message = 4;
}

// Reserve fund disbursement.
message ReserveDisbursement {
  sysio.opp.types.ChainAddress actor = 1;
  sysio.opp.types.TokenAmount  amount = 2;

  repeated sysio.opp.types.ChainSignature signature = 3;
}

// ---------------------------------------------------------------------------
//  Protocol state tracking
// ---------------------------------------------------------------------------


// Protocol state tracking for a message chain on a given chain.
message ProtocolState {
  sysio.opp.types.ChainId       chain_id = 1;
  bytes                         current_message_id = 2; // 32 bytes
  bytes                         processed_message_id = 3; // 32 bytes
  repeated sysio.opp.Message   incoming_messages = 10;
  repeated sysio.opp.Message    outgoing_messages = 11;
}

// ---------------------------------------------------------------------------
//  Cross-chain swap & underwriting attestations
// ---------------------------------------------------------------------------

// Cross-chain swap request (source Outpost -> Depot).
//
// The deposit IS the swap request — the user calls `swap(...)` on the source
// outpost, depositing source_amount, and the outpost immediately queues this
// attestation to the depot. `quoted_destination_amount` + `quote_tolerance_bps`
// + `quote_timestamp_ms` capture the LP price quote at deposit time so the
// depot can perform a variance-tolerance check (against `sysio.reserve::quote`
// at consensus time) before opening the underwriter race. If the gap exceeds
// tolerance, the depot emits a `SwapRevert` back to the source outpost and the
// user's deposit is refunded.
message SwapRequest {
  sysio.opp.types.ChainAddress actor = 1;
  sysio.opp.types.TokenAmount  source_amount = 2;
  sysio.opp.types.ChainId      target_chain = 3;
  sysio.opp.types.ChainAddress recipient = 4;
  sysio.opp.types.TokenKind    target_token = 5;
  // Quoted destination amount at deposit time, in destination-chain token units.
  uint64                       quoted_destination_amount = 6;
  // Variance tolerance in basis points (50 = 0.5%). The depot rejects with
  // SwapRevert if |current_price - quote_price| / quote_price > tolerance_bps/10000.
  uint32                       quote_tolerance_bps = 7;
  // Quote timestamp (milliseconds since epoch) — informational; the depot's
  // variance check uses the LP price at consensus time, not at quote time.
  uint64                       quote_timestamp_ms = 8;
  // Source-chain transaction id of the deposit that funded this swap.
  // ETH: 32-byte tx hash. SOL: 64-byte signature. Captured by the source
  // outpost at swap-emit time and surfaced here verbatim — the depot's
  // `sysio.uwrit::createuwreq` REJECTS any SwapRequest with an empty
  // `source_tx_id` (emits SwapRevert), and the underwriter plugin's
  // `verify_source_deposit` cross-references this tx against the depot's
  // recorded `depositor` + amount + token before committing collateral.
  bytes                        source_tx_id = 9;
}

// Underwriter intent commit (Outposts -> Depot, one per outpost).
//
// Underwriters never speak OPP directly — they construct this message off-chain,
// sign the digest of its own serialized-with-empty-`signature` form with their
// WIRE-account-permission private key, place the signature back into the
// `signature` field, re-serialize, and invoke `commit(bytes uic)` JSON-RPC on
// each outpost (source + destination). Each outpost auth-checks the caller as a
// registered active underwriter and relays the bytes verbatim to the depot. The
// depot's race resolver in `sysio.uwrit::rcrdcommit` records the per-leg arrival;
// when both legs land for the same underwriter, `try_select_winner` rebuilds
// the digest (serialize with `signature` blanked, sha256) and verifies it
// against the public keys on every permission of `uw_account` via
// `get_permission_lower_bound`. Any match accepts the commit.
//
// The COMMIT carries no chain-side lock fields — the lock is recorded entirely on the
// depot in `sysio.uwrit::locks` when the race resolves. Outposts are JSON-RPC relays
// that authenticate the caller as a registered underwriter; they do not validate the
// signature or the bond.
message UnderwriteIntentCommit {
  sysio.opp.types.WireAccount     uw_account = 1;
  // Underwriter's address on the outpost emitting this COMMIT.
  sysio.opp.types.ChainAddress    uw_ext_chain_addr = 2;
  // Depot's UWREQ id (the outpost reads this from the SWAP -> UWREQ ack).
  uint64                          uw_request_id = 3;
  // Which outpost this COMMIT came from (so the depot can match the dual-COMMIT pair).
  uint64                          outpost_id = 4;
  // Underwriter's signature over `sha256(serialize(self_with_signature_blanked))`
  // using a key that belongs to one of `uw_account`'s permissions. Binds the
  // commit to every other field in this message; an outpost forging a commit
  // in another underwriter's name cannot produce a verifying signature.
  bytes                           signature = 5;
  // TokenKind this COMMIT covers. Together with the outpost's chain (carried
  // by msgch::dispatch_underwrite_commit as `from_chain`), the pair
  // `(from_chain, token_kind)` disambiguates same-chain swaps where
  // both legs originate on the same outpost but cover different TokenKinds
  // (e.g. ERC20→ETH-native, USDC→USDT). The depot's `rcrdcommit` routes
  // the UIC into the source-leg slot when
  // `(from_chain, token_kind) == (uwreq.src_chain, uwreq.src_token_kind)`
  // and the dest-leg slot when it matches `(uwreq.dst_chain, uwreq.dst_token_kind)`.
  sysio.opp.types.TokenKind       token_kind = 6;
}

// Cross-chain swap revert (Depot -> source Outpost).
//
// Emitted when the variance-tolerance check on a SwapRequest fails: the LP price has
// drifted past the user's tolerance between quote time and consensus time. The source
// outpost matches by `original_swap_message_id` and refunds `refund_amount` (which
// equals the original `source_amount`) to the depositor.
message SwapRevert {
  // 32-byte OPP message id of the original SwapRequest attestation.
  bytes                        original_swap_message_id = 1;
  // The depositor address on the source chain — recipient of the refund.
  sysio.opp.types.ChainAddress depositor = 2;
  // Refund amount + token kind (matches the original SwapRequest.source_amount).
  sysio.opp.types.TokenAmount  refund_amount = 3;
  // Human-readable reason — e.g., "variance 12.4% > tolerance 0.5% (quote=1042 SOL, current=913 SOL)".
  string                       reason = 4;
}

// `UnderwriteIntent` and `UnderwriteConfirm` (legacy pre-launch messages) were
// removed alongside their `ATTESTATION_TYPE_UNDERWRITE_INTENT` /
// `ATTESTATION_TYPE_UNDERWRITE_CONFIRM` discriminants — the race is now
// resolved with the single `UnderwriteIntentCommit` message above plus the
// depot-internal `try_select_winner`. Slots in the AttestationType enum are
// left free; do not reuse.

// Swap-payout remittance (Depot -> destination Outpost).
//
// The depot is the ground truth — every SwapRemit is depot-authorized
// (variance check passed, underwriter race resolved). The destination
// outpost pays the recipient out of its reserve. If the transfer fails
// (insufficient reserve, recipient revert, paused contract, etc.) the
// outpost emits SwapRejected back to the depot and the token stays in
// its reserve; the depot's `sysio.reserv::onreject` re-adds the
// unremitted amount to `reserve_outpost_amount` so its view of the
// reserve reconciles.
//
// Renamed from `Remit` for clarity (operator collateral has its own
// WITHDRAW_REMIT carried as an OperatorAction.action_type — distinct
// flow, distinct field set).
message SwapRemit {
  sysio.opp.types.ChainAddress recipient = 1;
  sysio.opp.types.TokenAmount  amount = 2;
  bytes                        original_message_id = 3; // 32 bytes
  sysio.opp.types.ChainAddress underwriter = 4;
  uint64                       unlock_timestamp = 5;
}

// Swap-payout rejection (destination Outpost -> Depot).
//
// Emitted when an outpost cannot pay a SwapRemit. The token remains in
// the outpost's reserve; the depot calls `sysio.reserv::onreject` to
// re-add `unremitted_amount.amount` to `reserve_outpost_amount` so the
// depot's accounting reconciles with the outpost's actual balance.
// Outposts also push the failure onto a local ring buffer for
// post-hoc inspection.
message SwapRejected {
  // 32-byte OPP message id of the SwapRemit attestation that failed.
  bytes                        original_swap_remit_id = 1;
  // The recipient the outpost attempted to pay (carried for diagnostic
  // / cross-reference; depot does not branch on this).
  sysio.opp.types.ChainAddress recipient = 2;
  // The amount that could not be paid out and therefore remains in the
  // outpost's reserve. `kind` matches the original SwapRemit.amount.kind.
  sysio.opp.types.TokenAmount  unremitted_amount = 3;
  // Human-readable failure reason — e.g.
  // "insufficient reserve: needed 1042 SOL, had 800 SOL".
  string                       reason = 4;
}

// ---------------------------------------------------------------------------
//  Challenge attestations
// ---------------------------------------------------------------------------

// Challenge request (Depot -> source Outpost).
message ChallengeRequest {
  uint32                            epoch_index = 1;
  uint32                            round = 2;
  bytes                             original_chain_hash = 3; // 32 bytes
  repeated ChallengeOperatorHash    operator_hashes = 4;
}

// Per-operator hash submitted during a challenged epoch.
message ChallengeOperatorHash {
  sysio.opp.types.ChainAddress operator = 1;
  bytes                        chain_hash = 2; // 32 bytes
}

// ---------------------------------------------------------------------------
//  Epoch & roster management attestations
// ---------------------------------------------------------------------------

// `EpochSync` was removed — the depot's `sysio.epoch::advance` flow is now the
// sole driver of epoch progression, and `epoch_duration_sec` rides every
// `BatchOperatorGroups` attestation. No on-wire epoch-sync message exists. The
// `ATTESTATION_TYPE_EPOCH_SYNC = 60946` slot in `types.proto` is reserved; do
// not reuse it.

// Operator roster (Depot -> Outpost, every epoch).
message Operators {
  repeated OperatorEntry operators = 1;
}

message OperatorEntry {
  sysio.opp.types.WireAccount    account = 1;
  repeated sysio.opp.types.ChainAddress addresses = 2;
  sysio.opp.types.OperatorType   type = 3;
  sysio.opp.types.OperatorStatus status = 4;
}

// Batch operator group assignments (Depot -> Outpost, every epoch).
// Contains all groups and the index of the active group for the current epoch.
// `epoch_duration_sec` mirrors the depot's
// `sysio.epoch::epochcfg::epoch_duration_sec` so the outpost can evaluate
// the fallback (path-2) majority consensus only after that many seconds
// have elapsed since the current epoch started — see
// .claude/rules/opp-consensus.md.
message BatchOperatorGroups {
  uint32 active_group_index = 1;
  uint32 epoch_index = 2;
  repeated BatchOperatorGroup groups = 3;
  uint32 epoch_duration_sec = 4;
}

message BatchOperatorGroup {
  repeated sysio.opp.types.ChainAddress operators = 1;
}

// Reserve-target hint carried on `OperatorAction(action_type=SLASH)` —
// tells the outpost what to do with the slashed funds. The depot resolves
// this via `sysio.reserve::resolve_lp(chain, token_kind, role)`.
message ReserveTarget {
  enum Kind {
    KIND_UNKNOWN = 0;
    // Route to the matching paired-with-WIRE LP on the source chain. `paired_token`
    // identifies which LP gets credited.
    KIND_LP = 1;
    // Route to a burn / unrecoverable pool. `paired_token` unused.
    KIND_BURN = 2;
    // Route to a treasury account. `paired_token` unused.
    KIND_TREASURY = 3;
  }
  Kind                       kind = 1;
  // For KIND_LP, the token side of the WIRE-paired LP that receives the slashed funds.
  sysio.opp.types.TokenKind  paired_token = 2;
}

// Deposit refund (Depot -> source Outpost).
//
// Emitted by the depot's opreg layer when it can't accept an inbound DEPOSIT —
// the originating account is unknown to opreg, the operator has no authex
// link for the chain, etc. The outpost matches `original_deposit_message_id`
// to the deposit it escrowed and refunds `refund_amount` to `depositor`.
//
// Distinct from `SwapRevert` (which handles depot-INTERNAL swap failures like
// overcommit or quote-variance breaches): DEPOSIT_REVERT is purely about
// identity / link-table validation at the depot's opreg layer.
message DepositRevert {
  // 32-byte OPP message id of the original DEPOSIT attestation. The outpost
  // matches on this to scope the refund to one specific in-flight deposit.
  bytes                        original_deposit_message_id = 1;
  // Source-chain address that paid the original deposit — the refund target.
  sysio.opp.types.ChainAddress depositor                   = 2;
  // Refund amount + token kind (matches the original DEPOSIT.amount).
  sysio.opp.types.TokenAmount  refund_amount               = 3;
  // Why the depot rejected the deposit (e.g., "operator not registered",
  // "missing authex link for ETHEREUM").
  string                       reason                      = 4;
}

// ---------------------------------------------------------------------------
//  Operator Registry attestations
// ---------------------------------------------------------------------------

// NFT → WIRE token conversion (ETH BAR.sol → Depot).
message NodeOwnerReg {
  sysio.opp.types.ChainAddress owner_address = 1;
  bytes                        token_id = 2;
  sysio.opp.types.ChainAddress nft_address = 3;
}

// Staking reward distribution (Outpost -> Depot).
//
// Emitted by an outpost when a staker's slice of a validator-reward distribution
// has been computed. The depot routes this to `sysio.reserve::credit_lp` (or a
// per-staker share contract) so the staker's WIRE-side accounting is updated.
message StakingReward {
  // Outpost id emitting the reward — identifies the (chain, validator) context.
  uint64                       outpost_id = 1;
  // The staker's WIRE account.
  sysio.opp.types.WireAccount  staker_wire_account = 2;
  // The staker's share of the reward in basis points (10000 = 100%).
  uint32                       share_bps = 3;
  // Reward period (milliseconds since epoch).
  uint64                       period_start_ms = 4;
  uint64                       period_end_ms = 5;
  // Absolute reward amount + token kind being credited.
  sysio.opp.types.TokenAmount  reward_amount = 6;
}

// `NativeYieldReward` removed — `StakingReward` is the single staker-reward
// feedback path. The validator-reward bulk credit lives inside the outpost's
// reserve top-up, not in a separate attestation.

// Stake result confirmation (Depot → Outpost).
// Sent after processing a cross-chain stake attestation.
message StakeResult {
  sysio.opp.types.ChainAddress owner_address = 1;
  sysio.opp.types.TokenAmount  amount = 2;
  bool                         success = 3;
  string                       error_reason = 4;
}

// Attestation processing error (Depot → Outpost).
// Sent when an inbound attestation fails processing.
// Prevents breaking the OPP message chain.
message AttestationProcessingError {
  uint64                           attestation_id = 1;
  sysio.opp.types.AttestationType  original_type = 2;
  bytes                            original_data = 3;
  string                           error_message = 4;
}

name: "macOS arm64 build & tests"

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/macos_arm64_build.yaml"
      - ".github/vcpkg-triplets/**"
      - "cmake/**"
      - "libraries/**"
      - "plugins/**"
      - "programs/**"
      - "unittests/**"
      - "tests/**"
      - "CMakeLists.txt"
      - "vcpkg.json"
      - "vcpkg-configuration.json"
  pull_request:
    paths:
      - ".github/workflows/macos_arm64_build.yaml"
      - ".github/vcpkg-triplets/**"
      - "cmake/**"
      - "libraries/**"
      - "plugins/**"
      - "programs/**"
      - "unittests/**"
      - "tests/**"
      - "CMakeLists.txt"
      - "vcpkg.json"
      - "vcpkg-configuration.json"

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  parallel-tests:
    name: Build and run parallel tests on Apple Silicon (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 300
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            np_lr_jobs: 2
          - runner: macos-26
            np_lr_jobs: 2
    env:
      BUILD_DIR: build/macos-arm64-${{ matrix.runner }}
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg-binary-cache,readwrite"
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install host tools
        run: |
          brew install ninja ccache pkgconf autoconf automake libtool
          python3 -m venv "$RUNNER_TEMP/python-venv"
          "$RUNNER_TEMP/python-venv/bin/python" -m pip install --upgrade pip
          "$RUNNER_TEMP/python-venv/bin/python" -m pip install numpy
          echo "$RUNNER_TEMP/python-venv/bin" >> "$GITHUB_PATH"

      - name: Restore vcpkg binary cache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/vcpkg-binary-cache
          key: vcpkg-binaries-macos-arm64-${{ matrix.runner }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', '.github/vcpkg-triplets/arm64-osx-release.cmake') }}
          restore-keys: |
            vcpkg-binaries-macos-arm64-${{ matrix.runner }}-
            vcpkg-binaries-macos-arm64-

      - name: Restore ccache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-macos-arm64-${{ matrix.runner }}-${{ github.sha }}
          restore-keys: |
            ccache-macos-arm64-${{ matrix.runner }}-
            ccache-macos-arm64-

      - name: Configure
        run: |
          mkdir -p "$GITHUB_WORKSPACE/vcpkg-binary-cache"
          ./vcpkg/bootstrap-vcpkg.sh

          export CCACHE_DIR="$GITHUB_WORKSPACE/.ccache"
          export VCPKG_TARGET_TRIPLET=arm64-osx-release
          export VCPKG_HOST_TRIPLET=arm64-osx-release
          export VCPKG_OVERLAY_TRIPLETS="$GITHUB_WORKSPACE/.github/vcpkg-triplets"
          ccache -z || true

          cmake -B "$BUILD_DIR" -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$PWD/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET="$VCPKG_TARGET_TRIPLET" \
            -DVCPKG_HOST_TRIPLET="$VCPKG_HOST_TRIPLET" \
            -DVCPKG_OVERLAY_TRIPLETS="$VCPKG_OVERLAY_TRIPLETS" \
            -DBUILD_SYSTEM_CONTRACTS=OFF \
            -DBUILD_TEST_CONTRACTS=OFF \
            -DENABLE_CCACHE=ON \
            -DENABLE_DISTCC=OFF \
            -DENABLE_TESTS=ON \
            -DDISABLE_WASM_SPEC_TESTS=OFF

      - name: Build test targets
        run: |
          cmake --build "$BUILD_DIR" -- -j"$(sysctl -n hw.logicalcpu)"

      - name: Restore CTest cost data
        uses: actions/cache/restore@v5
        with:
          # CTest uses this file to schedule higher-cost tests first when running with -j.
          path: ${{ env.BUILD_DIR }}/Testing/Temporary/CTestCostData.txt
          key: ctest-cost-macos-arm64-${{ matrix.runner }}-${{ github.sha }}
          restore-keys: |
            ctest-cost-macos-arm64-${{ matrix.runner }}-
            ctest-cost-macos-arm64-

      - name: Run parallelizable tests
        run: |
          cd "$BUILD_DIR"
          ctest -j "$(sysctl -n hw.logicalcpu)" \
            -LE "(nonparallelizable_tests|long_running_tests)" \
            --output-on-failure --timeout 1000 \
            2>&1 | tee "$RUNNER_TEMP/macos-arm64-${{ matrix.runner }}-parallel-ctest.log"

      - name: Run sharded NP/LR tests
        run: |
          cd "$BUILD_DIR"
          test_jobs="${{ matrix.np_lr_jobs }}"
          echo "Running sharded NP/LR tests with ${test_jobs} jobs"
          ctest --output-on-failure -j "${test_jobs}" \
            -L "(nonparallelizable_tests|long_running_tests)" \
            -E "^read-only-trx-" \
            --timeout 2700 \
            2>&1 | tee "$RUNNER_TEMP/macos-arm64-${{ matrix.runner }}-np-lr-ctest.log"

      - name: Run read-only transaction NP tests
        run: |
          cd "$BUILD_DIR"
          ctest --output-on-failure -j 1 \
            -R "^read-only-trx-" \
            --timeout 2700 \
            2>&1 | tee "$RUNNER_TEMP/macos-arm64-${{ matrix.runner }}-read-only-ctest.log"

      - name: Save CTest cost data
        if: ${{ always() && hashFiles(format('{0}/Testing/Temporary/CTestCostData.txt', env.BUILD_DIR)) != '' }}
        uses: actions/cache/save@v5
        with:
          # Caches are immutable, so save each run under a unique key and restore by runner prefix.
          path: ${{ env.BUILD_DIR }}/Testing/Temporary/CTestCostData.txt
          key: ctest-cost-macos-arm64-${{ matrix.runner }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Show diagnostics on failure
        if: failure()
        run: |
          echo "=== vcpkg manifest log ==="
          cat "$BUILD_DIR/vcpkg-manifest-install.log" || true
          echo "=== recent vcpkg logs ==="
          find "$BUILD_DIR" -type f -name '*.log' -print 2>/dev/null | while read -r f; do
            echo "----- $f -----"
            tail -n 80 "$f"
          done
          echo "=== ccache statistics ==="
          ccache -s || true

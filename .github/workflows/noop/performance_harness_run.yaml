name: "Performance Harness Run"

on:
  workflow_dispatch:
    inputs:
      platform-choice:
        description: 'Select Platform'
        type: choice
        options:
        - ubuntu20
        - ubuntu22
      override-test-params:
        description: 'Override perf harness params'
        type: string
      override-sysio:
        description: Override sysio target
        type: string
      override-sysio-prerelease:
        type: choice
        description: Override sysio prelease
        options:
        - default
        - true
        - false

permissions:
  packages: read
  contents: read

defaults:
  run:
    shell: bash

jobs:

  v:
    name: Discover Inputs
    runs-on: ubuntu-latest
    outputs:
      test-params: ${{steps.overrides.outputs.test-params}}
      sysio-target: ${{steps.overrides.outputs.sysio-target}}
      sysio-prerelease: ${{steps.overrides.outputs.sysio-prerelease}}
    steps:
      - name: Setup Input Params
        id: overrides
        env:
          # Untrusted workflow_dispatch overrides are passed as environment variables and are NEVER
          # interpolated into the script body. GitHub expands ${{ }} before bash parses the script,
          # so interpolating an override directly would let a value such as $(...) run as shell code.
          # As env vars the values are inert data: bash does not re-evaluate command substitution
          # found inside a variable's value. Mirrors the hardened wire-sysio build.yaml (WSA-094).
          OVERRIDE_TEST_PARAMS: ${{ inputs.override-test-params }}
          OVERRIDE_SYSIO: ${{ inputs.override-sysio }}
          OVERRIDE_SYSIO_PRERELEASE: ${{ inputs.override-sysio-prerelease }}
        run: |
          # Defense in depth: reject overrides carrying shell metacharacters. The sysio target is a
          # ref/version (single token); test params are a space-separated argv string, so it gets a
          # wider allow-list that still blocks every shell metacharacter, glob, quote and newline.
          ref_re='^[A-Za-z0-9._/+-]+$'
          params_re='^[A-Za-z0-9 ._/=:,+-]*$'
          if [[ -n "$OVERRIDE_SYSIO" && ! "$OVERRIDE_SYSIO" =~ $ref_re ]]; then
            echo "::error::Invalid override-sysio '$OVERRIDE_SYSIO'; only [A-Za-z0-9._/+-] are allowed." >&2
            exit 1
          fi
          if [[ -n "$OVERRIDE_TEST_PARAMS" && ! "$OVERRIDE_TEST_PARAMS" =~ $params_re ]]; then
            echo "::error::Invalid override-test-params '$OVERRIDE_TEST_PARAMS'; shell metacharacters are not allowed." >&2
            exit 1
          fi

          echo "test-params=findMax testBpOpMode" >> "$GITHUB_OUTPUT"
          echo "sysio-target=DEFAULT" >> "$GITHUB_OUTPUT"
          echo "sysio-prerelease=false" >> "$GITHUB_OUTPUT"

          if [[ -n "$OVERRIDE_TEST_PARAMS" ]]; then
            echo "test-params=$OVERRIDE_TEST_PARAMS" >> "$GITHUB_OUTPUT"
          fi
          if [[ -n "$OVERRIDE_SYSIO" ]]; then
            echo "sysio-target=$OVERRIDE_SYSIO" >> "$GITHUB_OUTPUT"
          fi
          if [[ "$OVERRIDE_SYSIO_PRERELEASE" == "true" || "$OVERRIDE_SYSIO_PRERELEASE" == "false" ]]; then
            echo "sysio-prerelease=$OVERRIDE_SYSIO_PRERELEASE" >> "$GITHUB_OUTPUT"
          fi

  platform-cache:
    name: Platform Cache
    uses: Wire-Network/platform-cache-workflow/.github/workflows/platformcache.yaml@v1
    permissions:
      packages: write
      contents: read
    with:
      runs-on: '["self-hosted", "enf-x86-beefy"]'
      platform-files: .cicd/platforms

  reuse-build:
    name: Reuse sysio build
    needs: [v]
    runs-on: ubuntu-latest
    outputs:
      build-artifact: ${{steps.downloadBuild.outputs.downloaded-file}}
    steps:
        - name: Download builddir
          id: downloadBuild
          uses: AntelopeIO/asset-artifact-download-action@v3
          with:
            owner: AntelopeIO
            repo: sysio
            file: build.tar.gz
            target: ${{github.sha}}
            artifact-name: ${{github.event.inputs.platform-choice}}-build
            fail-on-missing-target: false

        - name: Upload builddir
          if: steps.downloadBuild.outputs.downloaded-file != ''
          uses: actions/upload-artifact@v4
          with:
            name: ${{github.event.inputs.platform-choice}}-build
            path: build.tar.gz
            compression-level: 0

  build-base:
    name: Run Build Workflow
    needs: [platform-cache, reuse-build]
    if: needs.reuse-build.outputs.build-artifact == ''
    uses: ./.github/workflows/build_base.yaml
    with:
      platforms: ${{needs.platform-cache.outputs.platforms}}
      platform-list: '["${{github.event.inputs.platform-choice}}"]'

  tests:
    name: Tests
    needs: [v, platform-cache, reuse-build, build-base]
    if: always() && (needs.build-base.result == 'success' || needs.reuse-build.result == 'success')
    runs-on: ["Leap-Perf-Ubuntu-22-16x64x600"]
    container:
      image: ${{fromJSON(needs.platform-cache.outputs.platforms)[github.event.inputs.platform-choice].image}}
    steps:
      - name: Download builddir
        uses: actions/download-artifact@v4
        with:
          name: ${{github.event.inputs.platform-choice}}-build
      - name: Extract Build Directory
        run: |
          tar xzf build.tar.gz
      - if: ${{ needs.v.outputs.sysio-target != 'DEFAULT' }}
        name: Download Prev Leap Version
        uses: AntelopeIO/asset-artifact-download-action@v3
        with:
          owner: AntelopeIO
          repo: sysio
          target: '${{needs.v.outputs.sysio-target}}'
          prereleases: ${{fromJSON(needs.v.outputs.sysio-prerelease)}}
          file: 'sysio.*${{github.event.inputs.platform-choice}}.*(x86_64|amd64).deb'
      - if: ${{ needs.v.outputs.sysio-target != 'DEFAULT' }}
        name: Install sysio & replace binaries for PH use
        run: |
          apt-get update
          apt-get install -y ./sysio*.deb
          rm build/bin/nodeop
          rm build/bin/clio
          cp /usr/bin/nodeop build/bin
          cp /usr/bin/clio build/bin
          ./build/bin/nodeop --full-version
          ./build/bin/clio version full
      - name: Run Performance Test
        env:
          # test-params is allow-list validated at the `v` job (no shell metacharacters) and passed
          # via env; left UNQUOTED below so it still word-splits into the script's argv, without
          # ${{ }} ever being expanded into the shell as code.
          TEST_PARAMS: ${{needs.v.outputs.test-params}}
        run: |
          cd build
          ./tests/PerformanceHarnessScenarioRunner.py $TEST_PARAMS
      - name: Prepare results
        id: prep-results
        run: |
          tar -pc build/PHSRLogs | zstd --long -T0 -9 > PHSRLogs.tar.zst
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: performance-test-results
          path: PHSRLogs.tar.zst
          compression-level: 0
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: performance-test-report
          path: ./build/PHSRLogs/**/report.json

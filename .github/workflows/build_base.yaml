name: "Build sysio"

on:
  workflow_call:
    inputs:
      platforms:
        description: "Platforms definitions"
        type: string
        required: true
      platform-list:
        description: "Array of platforms"
        type: string
        required: true
    secrets:
      GH_TOKEN_DEV:
        required: true

permissions:
  packages: read
  contents: read

defaults:
  run:
    shell: bash

jobs:
  Build:
    name: Build wire-sysio
    strategy:
      fail-fast: false
      matrix:
        platform: ${{fromJSON(inputs.platform-list)}}
    runs-on:
      group: core-repo-group
    container:
      image: ${{ fromJSON(inputs.platforms)[matrix.platform].image }}
      credentials:
        username: dev-wire
        password: ${{ secrets.GH_TOKEN_DEV }}
    env:
      CCACHE_MAXSIZE: "10G"
      CCACHE_COMPRESS: "true"
      CCACHE_COMPRESSLEVEL: "6"
    steps:
        - name: Allow safe directories
          run: git config --global --add safe.directory '*'

        - uses: actions/checkout@v5
          with:
            submodules: recursive

        - name: Restore vcpkg binary cache
          uses: actions/cache@v5
          with:
            path: ${{ github.workspace }}/vcpkg-binary-cache
            key: vcpkg-binaries-${{ matrix.platform }}-${{ hashFiles('vcpkg.json') }}
            restore-keys: |
              vcpkg-binaries-${{ matrix.platform }}-

        - name: Restore ccache
          uses: actions/cache@v5
          with:
            path: ${{ github.workspace }}/.ccache
            key: ccache-${{ matrix.platform }}-${{ github.sha }}
            restore-keys: |
              ccache-${{ matrix.platform }}-

        - name: Build
          id: build
          run: |
            echo "Building for ${{ matrix.platform }}"

            # Use $GITHUB_WORKSPACE (container path /__w/...) not ${{ github.workspace }}
            # (host path /home/runner/work/...) so ccache/vcpkg write to the mounted
            # volume and persist for actions/cache to save.
            export CCACHE_DIR="$GITHUB_WORKSPACE/.ccache"
            export VCPKG_BINARY_SOURCES="clear;files,$GITHUB_WORKSPACE/vcpkg-binary-cache,readwrite"

            # Clean intermediate vcpkg artifacts but preserve binary cache and downloads
            rm -rf vcpkg/buildtrees vcpkg/packages vcpkg/vcpkg_installed \
                    build/vcpkg_installed ~/.cache/vcpkg ~/.vcpkg

            mkdir -p "$GITHUB_WORKSPACE/vcpkg-binary-cache"

            ./vcpkg/bootstrap-vcpkg.sh

            chown -R $(id -u):$(id -g) $PWD

            # Reset ccache stats for this build
            ccache -z || true

            cmake -B build -S . -G Ninja ${SYSIO_PLATFORM_HAS_EXTRAS_CMAKE:+-C /extras.cmake} \
            -DCMAKE_C_COMPILER=$CC \
            -DCMAKE_CXX_COMPILER=$CXX \
            -DCMAKE_MAKE_PROGRAM=$CMAKE_MAKE_PROGRAM \
            -DCMAKE_TOOLCHAIN_FILE=$PWD/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_CCACHE=ON \
            -DENABLE_TESTS=ON \
            ${CMAKE_PREFIX_PATH:+-DCMAKE_PREFIX_PATH=$CMAKE_PREFIX_PATH}

            if [[ "${{ matrix.platform }}" == "gcc" ]]; then
              echo "Using reduced parallelism for gcc platform"
              cmake --build build -- -j 8
            else
              cmake --build build -- -j 11
            fi

            echo "=== ccache statistics ==="
            ccache -s || true

            tar -pcz --exclude "*.o" build > build.tar.gz

        - name: Show vcpkg logs if failure
          if: failure()
          run: |
            echo "$PWD"
            echo "=== vcpkg-manifest-install.log ==="
            cat build/vcpkg-manifest-install.log || true
            echo "=== Other vcpkg logs ==="
            find build -type f -name '*.log' | while read f; do
              echo "----- $f -----"
              tail -n 40 "$f"
            done

#        # REQUIRED FOR ACT, LOCAL RUNS OF GITHUB ACTIONS
#        - name: Installing nodejs
#          run: |
#            curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
#            sudo apt install -y nodejs

        - name: Upload builddir
          uses: actions/upload-artifact@v6
          with:
            name: ${{matrix.platform}}-build
            path: build.tar.gz
            compression-level: 0

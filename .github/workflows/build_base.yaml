name: "Build sysio"

on:
  workflow_call:
    inputs:
      platforms:
        description: "Platforms definitions"
        type: string
        required: true
      platform-list:
        description: "Array of platforms"
        type: string
        required: true
    secrets:
      GH_TOKEN_DEV:
        required: true

# Trusted CI publishes vcpkg binary cache packages to GitHub Packages. Fork pull
# requests run with GitHub's reduced token permissions and the build script
# switches them to forked-pr-ci mode, which uses a local vcpkg cache and unsets
# package credentials before configuring.
permissions:
  packages: write
  contents: read

defaults:
  run:
    shell: bash

jobs:
  Build:
    name: Build wire-sysio
    strategy:
      fail-fast: false
      matrix:
        platform: ${{fromJSON(inputs.platform-list)}}
    runs-on:
      group: core-repo-group
    container:
      image: ${{ fromJSON(inputs.platforms)[matrix.platform].image }}
      credentials:
        username: dev-wire
        password: ${{ secrets.GH_TOKEN_DEV }}
    env:
      CCACHE_MAXSIZE: "10G"
      CCACHE_COMPRESS: "true"
      CCACHE_COMPRESSLEVEL: "6"
      VCPKG_DISABLE_METRICS: "1"
      VCPKG_NUGET_FEED: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
    steps:
        - name: Allow safe directories
          run: git config --global --add safe.directory '*'

        - uses: actions/checkout@v5
          with:
            submodules: recursive

        - name: Restore ccache
          uses: actions/cache@v5
          with:
            path: ${{ github.workspace }}/.ccache
            key: ccache-${{ matrix.platform }}-${{ github.sha }}
            restore-keys: |
              ccache-${{ matrix.platform }}-

        - name: Build
          id: build
          env:
            GITHUB_TOKEN: ${{ github.token }}
            GITHUB_USER: ${{ github.repository_owner }}
            IS_FORK_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
            VCPKG_INSTALL_OPTIONS: --debug
          run: |
            echo "Building for ${{ matrix.platform }}"

            # Use $GITHUB_WORKSPACE (container path /__w/...) not ${{ github.workspace }}
            # (host path /home/runner/work/...) so ccache writes to the mounted
            # volume and persists for actions/cache to save.
            export CCACHE_DIR="$GITHUB_WORKSPACE/.ccache"

            chown -R $(id -u):$(id -g) $PWD

            # Reset ccache stats for this build
            ccache -z || true

            if [[ "${{ matrix.platform }}" == "gcc" ]]; then
              echo "Using reduced parallelism for gcc platform"
              BUILD_JOBS=8
            else
              BUILD_JOBS=11
            fi

            BUILD_MODE=trusted-ci
            if [[ "$IS_FORK_PR" == "true" ]]; then
              echo "Using local vcpkg binary cache for fork pull request"
              BUILD_MODE=forked-pr-ci
              unset GITHUB_TOKEN GITHUB_USER
            fi

            scripts/build-with-github-vcpkg-cache.sh \
              --mode "$BUILD_MODE" \
              --build-dir build \
              --jobs "$BUILD_JOBS" \
              --configure-only

            echo "Diagnostic vcpkg run completed; stopping before project build and artifact upload."
            exit 1

            echo "=== ccache statistics ==="
            ccache -s || true

            tar -pcz --exclude "*.o" build > build.tar.gz

        - name: Delete sysio triplet vcpkg NuGet packages
          if: always()
          env:
            GITHUB_TOKEN: ${{ github.token }}
            OWNER: ${{ github.repository_owner }}
          run: |
            set -euo pipefail

            python3 - <<'PY'
            import json
            import os
            import sys
            import time
            import urllib.error
            import urllib.parse
            import urllib.request

            owner = os.environ["OWNER"]
            token = os.environ["GITHUB_TOKEN"]
            suffix = "_x64-linux-sysio-release"
            base = "https://api.github.com"
            headers = {
                "Accept": "application/vnd.github+json",
                "Authorization": f"Bearer {token}",
                "X-GitHub-Api-Version": "2022-11-28",
                "User-Agent": "wire-sysio-vcpkg-cache-cleanup",
            }

            def request(method, path):
                req = urllib.request.Request(f"{base}{path}", headers=headers, method=method)
                try:
                    with urllib.request.urlopen(req) as response:
                        body = response.read().decode("utf-8")
                        return response.status, json.loads(body) if body else None
                except urllib.error.HTTPError as exc:
                    body = exc.read().decode("utf-8", errors="replace")
                    if exc.code in (404, 409):
                        return exc.code, None
                    print(f"{method} {path} failed with HTTP {exc.code}: {body}", file=sys.stderr)
                    raise

            status, packages = request(
                "GET",
                f"/users/{urllib.parse.quote(owner)}/packages?package_type=nuget&per_page=100",
            )
            if status != 200 or not packages:
                print("No packages visible for cleanup")
                sys.exit(0)

            targets = [package["name"] for package in packages if package["name"].endswith(suffix)]
            if not targets:
                print(f"No NuGet packages ending with {suffix} found")
                sys.exit(0)

            print("Deleting package versions for:")
            for target in targets:
                print(f"  {target}")

            for package_name in targets:
                page = 1
                while True:
                    encoded = urllib.parse.quote(package_name, safe="")
                    status, versions = request(
                        "GET",
                        f"/users/{urllib.parse.quote(owner)}/packages/nuget/{encoded}/versions?per_page=100&page={page}",
                    )
                    if status == 404 or not versions:
                        break

                    for version in versions:
                        version_id = version["id"]
                        version_name = version.get("name", version_id)
                        delete_status, _ = request(
                            "DELETE",
                            f"/users/{urllib.parse.quote(owner)}/packages/nuget/{encoded}/versions/{version_id}",
                        )
                        if delete_status == 204:
                            print(f"Deleted {package_name} {version_name}")
                        elif delete_status == 404:
                            print(f"Already deleted {package_name} {version_name}")
                        time.sleep(0.1)

                    page += 1

            print("Cleanup complete")
            PY

        - name: Show vcpkg logs if failure
          if: failure()
          run: |
            echo "$PWD"
            echo "=== vcpkg-manifest-install.log ==="
            cat build/vcpkg-manifest-install.log || true
            echo "=== Other vcpkg logs ==="
            find build -type f -name '*.log' | while read f; do
              echo "----- $f -----"
              tail -n 40 "$f"
            done

#        # REQUIRED FOR ACT, LOCAL RUNS OF GITHUB ACTIONS
#        - name: Installing nodejs
#          run: |
#            curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
#            sudo apt install -y nodejs

        - name: Upload builddir
          uses: actions/upload-artifact@v6
          with:
            name: ${{matrix.platform}}-build
            path: build.tar.gz
            compression-level: 0

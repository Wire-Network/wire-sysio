name: "Build sysio"

on:
  workflow_call:
    inputs:
      platforms:
        description: "Platforms definitions"
        type: string
        required: true
      platform-list:
        description: "Array of platforms"
        type: string
        required: true
    secrets:
      GH_TOKEN_DEV:
        required: true

permissions:
  packages: read
  contents: read

defaults:
  run:
    shell: bash

jobs:
  Build:
    name: Build wire-sysio
    strategy:
      fail-fast: false
      matrix:
        platform: ${{fromJSON(inputs.platform-list)}}
    runs-on:
      group: core-repo-group
    container:
      image: ${{ fromJSON(inputs.platforms)[matrix.platform].image }}
      credentials:
        username: dev-wire
        password: ${{ secrets.GH_TOKEN_DEV }}
    env:
      CCACHE_MAXSIZE: "10G"
      CCACHE_COMPRESS: "true"
      CCACHE_COMPRESSLEVEL: "6"
    steps:
        - name: Allow safe directories
          run: git config --global --add safe.directory '*'

        - uses: actions/checkout@v5
          with:
            submodules: recursive

        - name: Restore vcpkg binary cache
          uses: actions/cache@v5
          with:
            path: ${{ github.workspace }}/vcpkg-binary-cache
            key: vcpkg-binaries-${{ matrix.platform }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', '.github/vcpkg-triplets/**') }}
            restore-keys: |
              vcpkg-binaries-${{ matrix.platform }}-

        - name: Restore ccache
          uses: actions/cache@v5
          with:
            path: ${{ github.workspace }}/.ccache
            key: ccache-${{ matrix.platform }}-${{ github.sha }}
            restore-keys: |
              ccache-${{ matrix.platform }}-

        - name: Build
          id: build
          env:
            SYSIO_PLATFORM_NAME: ${{ matrix.platform }}
          run: |
            if [[ "${{ matrix.platform }}" == "gcc" ]]; then
              build_jobs=8
            else
              build_jobs=11
            fi

            bash .github/scripts/build-sysio.sh "$build_jobs"

            tar -pcz --exclude "*.o" build > build.tar.gz

        - name: Show vcpkg logs if failure
          if: failure()
          run: |
            echo "$PWD"
            echo "=== vcpkg-manifest-install.log ==="
            cat build/vcpkg-manifest-install.log || true
            echo "=== Other vcpkg logs ==="
            find build -type f -name '*.log' | while read f; do
              echo "----- $f -----"
              tail -n 40 "$f"
            done

#        # REQUIRED FOR ACT, LOCAL RUNS OF GITHUB ACTIONS
#        - name: Installing nodejs
#          run: |
#            curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
#            sudo apt install -y nodejs

        - name: Upload builddir
          uses: actions/upload-artifact@v6
          with:
            name: ${{matrix.platform}}-build
            path: build.tar.gz
            compression-level: 0

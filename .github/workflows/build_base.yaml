name: "Build sysio"

on:
  workflow_call:
    inputs:
      platforms:
        description: "Platforms definitions"
        type: string
        required: true
      platform-list:
        description: "Array of platforms"
        type: string
        required: true
    secrets:
      GH_TOKEN_DEV:
        required: true

permissions:
  packages: write
  contents: read

defaults:
  run:
    shell: bash

jobs:
  Build:
    name: Build wire-sysio
    strategy:
      fail-fast: false
      matrix:
        platform: ${{fromJSON(inputs.platform-list)}}
    runs-on:
      group: core-repo-group
    container:
      image: ${{ fromJSON(inputs.platforms)[matrix.platform].image }}
      credentials:
        username: dev-wire
        password: ${{ secrets.GH_TOKEN_DEV }}
    env:
      CCACHE_MAXSIZE: "10G"
      CCACHE_COMPRESS: "true"
      CCACHE_COMPRESSLEVEL: "6"
      VCPKG_DISABLE_METRICS: "1"
      VCPKG_NUGET_FEED_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
      VCPKG_NUGET_USER: ${{ github.repository_owner }}
    steps:
        - name: Allow safe directories
          run: git config --global --add safe.directory '*'

        - uses: actions/checkout@v5
          with:
            submodules: recursive

        - name: Restore ccache
          uses: actions/cache@v5
          with:
            path: ${{ github.workspace }}/.ccache
            key: ccache-${{ matrix.platform }}-${{ github.sha }}
            restore-keys: |
              ccache-${{ matrix.platform }}-

        - name: Build
          id: build
          env:
            GITHUB_TOKEN: ${{ secrets.GH_TOKEN_DEV }}
            GITHUB_USER: ${{ github.repository_owner }}
            IS_FORK_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
          run: |
            echo "Building for ${{ matrix.platform }}"

            # Use $GITHUB_WORKSPACE (container path /__w/...) not ${{ github.workspace }}
            # (host path /home/runner/work/...) so ccache writes to the mounted
            # volume and persists for actions/cache to save.
            export CCACHE_DIR="$GITHUB_WORKSPACE/.ccache"

            chown -R $(id -u):$(id -g) $PWD

            # Reset ccache stats for this build
            ccache -z || true

            if [[ "${{ matrix.platform }}" == "gcc" ]]; then
              echo "Using reduced parallelism for gcc platform"
              BUILD_JOBS=8
            else
              BUILD_JOBS=11
            fi

            BUILD_MODE=trusted-ci
            if [[ "$IS_FORK_PR" == "true" ]]; then
              echo "Using local vcpkg binary cache for fork pull request"
              BUILD_MODE=forked-pr-ci
              unset GITHUB_TOKEN GITHUB_USER
            fi

            scripts/build-with-github-vcpkg-cache.sh \
              --mode "$BUILD_MODE" \
              --build-dir build \
              --jobs "$BUILD_JOBS" \
              --skip-tests

            echo "=== ccache statistics ==="
            ccache -s || true

            tar -pcz --exclude "*.o" build > build.tar.gz

        - name: Show vcpkg logs if failure
          if: failure()
          run: |
            echo "$PWD"
            echo "=== vcpkg-manifest-install.log ==="
            cat build/vcpkg-manifest-install.log || true
            echo "=== Other vcpkg logs ==="
            find build -type f -name '*.log' | while read f; do
              echo "----- $f -----"
              tail -n 40 "$f"
            done

#        # REQUIRED FOR ACT, LOCAL RUNS OF GITHUB ACTIONS
#        - name: Installing nodejs
#          run: |
#            curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
#            sudo apt install -y nodejs

        - name: Upload builddir
          uses: actions/upload-artifact@v6
          with:
            name: ${{matrix.platform}}-build
            path: build.tar.gz
            compression-level: 0

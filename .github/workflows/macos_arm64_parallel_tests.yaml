name: "macOS arm64 parallel tests"

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/macos_arm64_parallel_tests.yaml"
      - ".github/vcpkg-triplets/**"
      - "cmake/**"
      - "libraries/**"
      - "plugins/**"
      - "programs/**"
      - "unittests/**"
      - "tests/**"
      - "CMakeLists.txt"
      - "vcpkg.json"
      - "vcpkg-configuration.json"

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  parallel-tests:
    name: Build and run parallel tests on Apple Silicon
    runs-on: macos-15
    timeout-minutes: 180
    env:
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg-binary-cache,readwrite"
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install host tools
        run: |
          brew install ninja ccache pkgconf autoconf automake libtool

      - name: Restore vcpkg binary cache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/vcpkg-binary-cache
          key: vcpkg-binaries-macos-arm64-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-binaries-macos-arm64-

      - name: Restore ccache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-macos-arm64-${{ github.sha }}
          restore-keys: |
            ccache-macos-arm64-

      - name: Configure
        run: |
          mkdir -p "$GITHUB_WORKSPACE/vcpkg-binary-cache"
          ./vcpkg/bootstrap-vcpkg.sh

          export CCACHE_DIR="$GITHUB_WORKSPACE/.ccache"
          ccache -z || true

          cmake -B build/macos-arm64 -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_TOOLCHAIN_FILE="$PWD/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=arm64-osx \
            -DBUILD_SYSTEM_CONTRACTS=OFF \
            -DBUILD_TEST_CONTRACTS=OFF \
            -DENABLE_CCACHE=ON \
            -DENABLE_DISTCC=OFF \
            -DENABLE_TESTS=ON \
            -DENABLE_JEMALLOC=OFF \
            -DDISABLE_WASM_SPEC_TESTS=ON

      - name: Build test targets
        run: |
          cmake --build build/macos-arm64 -- -j"$(sysctl -n hw.logicalcpu)"

      - name: Run parallelizable tests
        run: |
          cd build/macos-arm64
          ctest -j "$(sysctl -n hw.logicalcpu)" \
            -LE "(nonparallelizable_tests|long_running_tests|wasm_spec_tests)" \
            --output-on-failure --timeout 1000 \
            2>&1 | tee "$RUNNER_TEMP/macos-arm64-parallel-ctest.log"

      - name: Show diagnostics on failure
        if: failure()
        run: |
          echo "=== vcpkg manifest log ==="
          cat build/macos-arm64/vcpkg-manifest-install.log || true
          echo "=== recent vcpkg logs ==="
          find build/macos-arm64 -type f -name '*.log' -print | while read -r f; do
            echo "----- $f -----"
            tail -n 80 "$f"
          done
          echo "=== ccache statistics ==="
          ccache -s || true
